<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>成语图鉴</title>
<style>
:root{
  --ink:#3b2f23;        /* 墨棕 */
  --paper:#faf6ec;      /* 卷轴米黄 */
  --paper-deep:#f0e7d3;
  --seal:#c0392b;       /* 印章红 */
  --jade:#3f7d5c;       /* 玉青（点亮） */
  --gold-a:#e8c569; --gold-b:#b8862d; /* 金卡 */
  --grey:#9a917f;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;background:var(--paper);color:var(--ink);overscroll-behavior:none}
.disp{font-family:"Songti SC","STSong","SimSun","Noto Serif SC",serif}

/* ===== 顶栏 ===== */
header{position:sticky;top:0;z-index:20;background:var(--paper);border-bottom:1px solid var(--paper-deep);padding:14px 16px 10px}
h1{font-size:22px;letter-spacing:.12em;display:flex;align-items:baseline;gap:10px}
h1 .sub{font-size:12px;letter-spacing:.05em;color:var(--grey);font-family:inherit}
.stats{margin-top:6px;font-size:13px;color:var(--grey);display:flex;gap:14px;align-items:center}
.stats b{color:var(--ink)}
.stats .gold-n{color:var(--gold-b)}

/* ===== 图鉴网格 ===== */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:14px 14px 90px;max-width:980px;margin:0 auto}
.card{position:relative;border-radius:var(--radius);overflow:hidden;background:#fff;box-shadow:0 1px 4px rgba(59,47,35,.12);cursor:pointer;transition:transform .15s}
.card:active{transform:scale(.97)}
.card img{display:block;width:100%;aspect-ratio:3/4;object-fit:contain;object-position:center;background:#17130d}
.card.unread img{filter:grayscale(.9) brightness(.92);opacity:.75}
.card .nm{position:absolute;left:0;right:0;bottom:0;padding:16px 8px 7px;background:linear-gradient(transparent,rgba(59,47,35,.82));color:#fff;font-size:15px;letter-spacing:.08em;text-align:center}
.card.read{outline:2.5px solid var(--jade);outline-offset:-2.5px}
.card.gold{outline:3px solid var(--gold-b);outline-offset:-3px}
.card.gold::before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(120deg,transparent 30%,rgba(255,240,190,.35) 46%,rgba(255,255,255,.55) 50%,rgba(255,240,190,.35) 54%,transparent 70%);background-size:250% 250%;animation:sheen 3.2s ease-in-out infinite}
@keyframes sheen{0%{background-position:120% 0}55%,100%{background-position:-60% 0}}
.card .seal{position:absolute;top:7px;right:7px;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;opacity:0;transform:scale(.6);transition:.25s}
.card.read .seal{opacity:1;transform:none;background:var(--jade)}
.card.gold .seal{opacity:1;transform:none;background:linear-gradient(160deg,var(--gold-a),var(--gold-b));color:#5a3d0c;font-weight:700}
@media (prefers-reduced-motion:reduce){.card.gold::before{animation:none}}

/* 混战关卡片 */
.battle{grid-column:1/-1;border:2px solid var(--gold-b);border-radius:var(--radius);padding:18px;text-align:center;color:var(--ink);font-size:14px;background:linear-gradient(135deg,#fff8df,#ead6a2);cursor:pointer;box-shadow:0 4px 14px rgba(90,61,12,.12)}
.battle b{color:var(--gold-b)}
.battle.locked{filter:grayscale(.65);cursor:not-allowed;border-style:dashed}
.battle small{display:block;margin-top:5px;color:#75684f}
.battle-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;margin-top:12px}
.battle-level{border:1px solid #d9c58f;background:#fff;border-radius:12px;padding:12px;text-align:left;cursor:pointer;color:var(--ink)}
.battle-level:disabled{opacity:.48;cursor:not-allowed}
.battle-level strong{display:block;color:#8a6318;margin-bottom:4px}
.battle-level.done{border-color:var(--jade);background:#eef6f0}
.modal{position:fixed;inset:0;z-index:65;background:rgba(21,18,16,.72);display:none;align-items:center;justify-content:center;padding:18px}
.modal.on{display:flex}.modalbox{width:min(620px,100%);max-height:88vh;overflow:auto;background:var(--paper);border-radius:18px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.45)}
.modalhead{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}.modalhead h2{font-size:21px}.xbtn{border:0;background:transparent;font-size:26px;color:var(--ink);cursor:pointer}
.reward-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.reward-grid img{width:100%;border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,.2)}

/* ===== 阅读器 ===== */
#reader{position:fixed;inset:0;z-index:50;background:#151210;display:none;flex-direction:column}
#reader.on{display:flex}
.rtop{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;color:#f2ead8;background:rgba(21,18,16,.9);z-index:5}
.rtop .t{font-size:17px;letter-spacing:.1em}
.rtop .t small{font-size:11px;color:#b3a892;margin-left:8px;letter-spacing:.03em}
.rtop button{background:none;border:none;color:#f2ead8;font-size:22px;padding:4px 8px;cursor:pointer}
#stage{flex:1;position:relative;overflow:hidden;touch-action:none}
.pg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;will-change:transform}
.pg img{max-width:100%;max-height:100%;user-select:none;-webkit-user-drag:none;transform-origin:0 0}
.rbot{display:flex;gap:10px;align-items:center;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:rgba(21,18,16,.9);z-index:5}
.rbot button{flex:1;border:none;border-radius:10px;padding:12px 8px;font-size:15px;cursor:pointer;font-family:inherit}
.bghost{background:#3a332b;color:#e8dfc9}
.bmain{background:linear-gradient(160deg,var(--gold-a),var(--gold-b));color:#4a3208;font-weight:700;letter-spacing:.05em}
.bmain:disabled{background:#3a332b;color:#7d7263;font-weight:400}
.hint{position:absolute;bottom:8px;left:0;right:0;text-align:center;color:#b3a892;font-size:11px;pointer-events:none;z-index:4}

/* 释义抽屉 */
#info{position:absolute;left:0;right:0;bottom:0;background:var(--paper);border-radius:16px 16px 0 0;padding:18px 18px 22px;transform:translateY(105%);transition:transform .25s;z-index:6;box-shadow:0 -4px 20px rgba(0,0,0,.35)}
#info.on{transform:none}
#info .cy{font-size:22px;letter-spacing:.15em}
#info .py{font-size:13px;color:var(--grey);margin:2px 0 10px}
#info p{font-size:15px;line-height:1.65;margin-bottom:8px}
#info .lbl{display:inline-block;background:var(--seal);color:#fff;font-size:12px;border-radius:5px;padding:1px 7px;margin-right:7px}

/* ===== 答题弹层 ===== */
#quiz{position:fixed;inset:0;z-index:60;background:rgba(21,18,16,.55);display:none;align-items:flex-end;justify-content:center}
#quiz.on{display:flex}
.qbox{background:var(--paper);width:100%;max-width:560px;border-radius:18px 18px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:86%;overflow-y:auto}
.qbox .qtag{font-size:12px;color:var(--grey);letter-spacing:.05em;margin-bottom:6px}
.qbox .stem{font-size:17px;line-height:1.55;margin-bottom:14px}
.opt{display:block;width:100%;text-align:left;border:1.5px solid var(--paper-deep);background:#fff;border-radius:12px;padding:13px 14px;font-size:15px;line-height:1.5;margin-bottom:10px;cursor:pointer;font-family:inherit;color:var(--ink)}
.opt.sel-right{border-color:var(--jade);background:#eef6f0}
.opt.sel-wrong{border-color:var(--seal);background:#faeeec}
.opt:disabled{opacity:.95}
.why{font-size:13.5px;line-height:1.6;color:#6b5f4d;background:var(--paper-deep);border-radius:10px;padding:10px 12px;margin:-2px 0 10px}
.qact{display:flex;gap:10px;margin-top:8px}
.qact button{flex:1;border:none;border-radius:10px;padding:13px;font-size:15px;cursor:pointer;font-family:inherit}
.gold-toast{position:fixed;inset:0;z-index:70;display:none;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:radial-gradient(ellipse at 50% 40%,rgba(64,48,20,.92),rgba(10,8,6,.97));perspective:1100px}
.gold-toast.on{display:flex}
.g3d{width:min(320px,76vw);aspect-ratio:3/4.35;position:relative;transform-style:preserve-3d;transition:transform .9s cubic-bezier(.2,.8,.3,1)}
.gold-toast.on .g3d{animation:gflip .95s cubic-bezier(.25,.9,.3,1.05) forwards}
@keyframes gflip{0%{transform:rotateY(180deg) scale(.55);opacity:0}55%{opacity:1}100%{transform:rotateY(0) scale(1);opacity:1}}
.gface{position:absolute;inset:0;border-radius:18px;backface-visibility:hidden;overflow:hidden}
.gback{transform:rotateY(180deg);background:#1c150d;border:3px solid var(--gold-b);display:flex;align-items:center;justify-content:center}
.gback .bseal{width:86px;height:86px;border:3px solid var(--gold-a);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:44px;color:var(--gold-a)}
.gfront{background:linear-gradient(165deg,#241a0e,#151009 60%,#241a0e);border:3px solid transparent;background-clip:padding-box;box-shadow:0 0 0 3px var(--gold-b),0 0 60px rgba(232,197,105,.35),0 20px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;padding:14px 14px 12px;color:#f4e6bf}
.gfront::before{content:"";position:absolute;inset:7px;border:1px solid rgba(232,197,105,.55);border-radius:12px;pointer-events:none}
.gholo{position:absolute;inset:0;pointer-events:none;mix-blend-mode:overlay;opacity:.9;background:linear-gradient(115deg,transparent 20%,rgba(255,236,170,.10) 35%,rgba(255,255,255,.55) 47%,rgba(180,255,230,.25) 52%,rgba(255,200,240,.22) 57%,rgba(255,236,170,.10) 68%,transparent 82%);background-size:280% 280%;background-position:var(--hx,120%) 0;transition:background-position .08s linear}
.gold-toast.on .gholo{animation:gsweep 2.6s .95s ease-in-out 1}
@keyframes gsweep{0%{background-position:130% 0}100%{background-position:-40% 0}}
.gnum{position:absolute;top:16px;left:18px;font-size:11px;letter-spacing:.15em;color:rgba(244,230,191,.75);z-index:2}
.gseal{position:absolute;top:12px;right:14px;width:34px;height:34px;border-radius:8px;background:linear-gradient(160deg,var(--gold-a),var(--gold-b));color:#4a3208;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:17px;z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.gimg{margin:0;border-radius:12px;overflow:hidden;border:1.5px solid rgba(232,197,105,.7);flex:1;min-height:0}
.gimg img{width:100%;height:100%;object-fit:contain;object-position:center;display:block;background:#090806}
.gfront .gnum,.gfront .gseal,.gfront .gname,.gfront .gpy,.gfront .gdef{display:none}
.gname{font-size:26px;letter-spacing:.28em;text-align:center;color:#ffe9ad;text-shadow:0 0 14px rgba(232,197,105,.5)}
.gpy{font-size:12px;letter-spacing:.06em;text-align:center;color:rgba(244,230,191,.7);margin:2px 0 7px}
.gdef{font-size:12px;line-height:1.5;text-align:center;color:rgba(244,230,191,.85);border-top:1px solid rgba(232,197,105,.35);padding-top:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sp{position:absolute;width:9px;height:9px;pointer-events:none;background:radial-gradient(circle,#fff 0 18%,rgba(255,236,170,.95) 40%,transparent 70%);clip-path:polygon(50% 0,62% 38%,100% 50%,62% 62%,50% 100%,38% 62%,0 50%,38% 38%);opacity:0}
.gold-toast.on .sp{animation:tw 1.7s ease-in-out infinite}
.sp.s1{top:9%;left:12%;animation-delay:1s}.sp.s2{top:20%;right:9%;animation-delay:1.35s;transform:scale(1.6)}
.sp.s3{bottom:26%;left:7%;animation-delay:1.7s;transform:scale(1.3)}.sp.s4{bottom:10%;right:14%;animation-delay:2.1s}
@keyframes tw{0%,100%{opacity:0;transform:scale(.4) rotate(0)}50%{opacity:1;transform:scale(1.25) rotate(45deg)}}
.gact{border:none;border-radius:12px;padding:13px 34px;font-size:16px;letter-spacing:.1em;font-family:inherit;cursor:pointer;background:linear-gradient(160deg,var(--gold-a),var(--gold-b));color:#4a3208;font-weight:700;box-shadow:0 4px 20px rgba(232,197,105,.35)}
.gtip{color:rgba(244,230,191,.55);font-size:12px;letter-spacing:.05em}
@media (prefers-reduced-motion:reduce){.gold-toast.on .g3d{animation:none;transform:none}.gold-toast.on .gholo,.gold-toast.on .sp{animation:none}.gholo{background-position:40% 0}}
#loadmsg{padding:60px 20px;text-align:center;color:var(--grey);font-size:14px}
</style>
</head>
<body>

<header>
  <h1 class="disp">成语图鉴 <span class="sub" id="hsub"></span></h1>
  <div class="stats">已点亮 <b id="stRead">0</b>/<b id="stTotal">0</b><span>·</span>金卡 <b class="gold-n" id="stGold">0</b><span>·</span><span id="stBattle"></span></div>
</header>

<div id="loadmsg">图鉴加载中…</div>
<div id="grid"></div>

<!-- 阅读器 -->
<div id="reader">
  <div class="rtop">
    <button id="rBack" aria-label="返回">‹</button>
    <div class="t disp"><span id="rName"></span><small id="rPy"></small></div>
    <button id="rInfo" aria-label="释义">释</button>
  </div>
  <div id="stage"><div class="hint">左右滑动翻页 · 双指或双击放大</div></div>
  <div class="rbot">
    <button class="bghost" id="rPrev">‹ 上一张</button>
    <button class="bmain" id="rQuiz">答题赢金卡</button>
    <button class="bghost" id="rNext">下一张 ›</button>
  </div>
  <div id="info"></div>
</div>

<!-- 答题 -->
<div id="quiz"><div class="qbox" id="qbox"></div></div>
<div class="modal" id="battleModal"><div class="modalbox"><div class="modalhead"><h2 class="disp">近义成语混战</h2><button class="xbtn" id="battleClose">×</button></div><div id="battleBody"></div></div></div>
<div class="gold-toast" id="goldToast">
  <div class="g3d" id="g3d">
    <div class="gface gback"><div class="bseal disp">印</div></div>
    <div class="gface gfront" id="gfront">
      <div class="gnum" id="gNum"></div><div class="gseal">奖</div>
      <div class="gimg"><img id="gImg" alt=""></div>
      <div class="gname disp" id="gtName"></div><div class="gpy" id="gPy"></div><div class="gdef" id="gDef"></div>
      <div class="gholo" id="gHolo"></div>
      <span class="sp s1"></span><span class="sp s2"></span><span class="sp s3"></span><span class="sp s4"></span>
    </div>
  </div>
  <div class="gtip">在卡面上滑动，看金光流动 ✧</div>
  <button class="gact" id="gClose">收入图鉴 ✦</button>
</div>

<script>
'use strict';
const CONTENT_URL = 'content/hcl-all-chengyu-47-70.json';
const qs = new URLSearchParams(location.search);
const SRC = qs.get('src') || CONTENT_URL;
const REWARD_CARDS=['assets/rewards/厉害哟.png','assets/rewards/太棒啦.png','assets/rewards/酷毙了.png'];
const BATTLES=[
 {title:'第一关 · 回头是岸',need:5,qs:[
  {s:'曾经犯过严重错误，如今彻底改正，重新做人。',o:['改过自新','改邪归正','敷衍塞责'],a:0,w:'“改过自新”强调改正过错、重新做人。'},
  {s:'他脱离非法集团，重新走上正途。',o:['改过自新','改邪归正','奉公守法'],a:1,w:'离开邪路、回到正路，最准确的是“改邪归正”。'},
  {s:'姐姐每天认真排练，却被说成______，显然不合适。',o:['废寝忘食','敷衍塞责','高瞻远瞩'],a:1,w:'“敷衍塞责”指草草应付，与认真排练矛盾。'}]},
 {title:'第二关 · 安逸警报',need:10,qs:[
  {s:'事情已安排妥当，因此可以放心，不必忧虑。',o:['高枕无忧','苟且偷安','裹足不前'],a:0,w:'准备充分、顾虑解除，可说“高枕无忧”。'},
  {s:'只顾眼前安逸，不作长远打算。',o:['高瞻远瞩','苟且偷安','高枕无忧'],a:1,w:'“苟且偷安”批评只顾眼前安逸、得过且过。'},
  {s:'因为害怕失败而停步，不敢继续尝试。',o:['裹足不前','孤注一掷','功亏一篑'],a:0,w:'有所顾虑而停步，正是“裹足不前”。'}]},
 {title:'第三关 · 成败之间',need:15,qs:[
  {s:'工程只差最后一步，却因疏忽而失败。',o:['孤注一掷','功亏一篑','海底捞针'],a:1,w:'接近成功时因最后一步没做好而失败，是“功亏一篑”。'},
  {s:'把全部希望和力量都押在最后一次冒险上。',o:['赴汤蹈火','孤注一掷','废寝忘食'],a:1,w:'“孤注一掷”强调把所有筹码押在一次冒险上。'},
  {s:'为了救人，即使危险也奋勇向前。',o:['赴汤蹈火','孤注一掷','骇人听闻'],a:0,w:'为正义或他人不避艰险，可用“赴汤蹈火”。'}]},
 {title:'第四关 · 力量对决',need:20,qs:[
  {s:'一个人的力量有限，难以把事情办成。',o:['寡不敌众','孤掌难鸣','各有千秋'],a:1,w:'“孤掌难鸣”比喻单凭一个人的力量难以成事。'},
  {s:'人数少的一方抵挡不住人数多的一方。',o:['孤掌难鸣','寡不敌众','害群之马'],a:1,w:'“寡不敌众”直接比较双方人数与力量。'},
  {s:'两种方案各有长处，让评审难以取舍。',o:['各有千秋','勾心斗角','纷至沓来'],a:0,w:'各有特色和长处，正是“各有千秋”。'}]},
 {title:'终极关 · 品格明暗',need:24,qs:[
  {s:'为了争权夺利，彼此暗中排挤、算计。',o:['光明正大','勾心斗角','沽名钓誉'],a:1,w:'“勾心斗角”形容彼此明争暗斗、互相算计。'},
  {s:'做善事只是为了博取好名声。',o:['沽名钓誉','奉公守法','光明正大'],a:0,w:'“沽名钓誉”指用不正当手段谋取名誉。'},
  {s:'一个人破坏集体纪律，影响所有成员。',o:['害群之马','孤陋寡闻','根深蒂固'],a:0,w:'危害集体的人或事物，可称“害群之马”。'},
  {s:'做事坦白正派，没有不可告人的目的。',o:['高瞻远瞩','光明正大','奉公守法'],a:1,w:'行为正派、襟怀坦白，是“光明正大”。'}]}
];

/* ---------- 进度存取（localStorage 不可用时自动降级内存） ---------- */
let DATA=null, PAGES=[], KEY='';
let mem={};
function loadProg(){ try{ const raw=localStorage.getItem(KEY); return raw?JSON.parse(raw):{}; }catch(e){ return mem; } }
function saveProg(p){ try{ localStorage.setItem(KEY,JSON.stringify(p)); }catch(e){ mem=p; } }
/* prog = { "成语": {read:true, q:{"Q1":true,...}}, _battle:{0:true,...} } */
let prog={};
const isRead = id => !!(prog[id]&&prog[id].read);
const isGold = pg => pg.questions.length>0 && pg.questions.every(q=> prog[pg.id]&&prog[pg.id].q&&prog[pg.id].q[q.id]);
function markRead(id){ prog[id]=prog[id]||{q:{}}; prog[id].read=true; saveProg(prog); refreshGrid(); }
function markQ(id,qid){ prog[id]=prog[id]||{q:{}}; prog[id].q=prog[id].q||{}; prog[id].q[qid]=true; saveProg(prog); }

/* ---------- 目录 ---------- */
const grid=document.getElementById('grid');
function refreshGrid(){
  let nRead=0,nGold=0;
  PAGES.forEach((pg,i)=>{
    const el=grid.children[i]; if(!el) return;
    const gold=isGold(pg), read=isRead(pg.id);
    el.className='card '+(gold?'gold':read?'read':'unread');
    el.querySelector('.seal').textContent = gold?'金':'✓';
    if(read)nRead++; if(gold)nGold++;
  });
  document.getElementById('stRead').textContent=nRead;
  document.getElementById('stGold').textContent=nGold;
  const done=Object.values((prog._battle)||{}).filter(Boolean).length;
  document.getElementById('stBattle').textContent='混战 '+done+'/'+BATTLES.length;
  const b=document.getElementById('battleCard');
  if(b){ b.classList.toggle('locked',nGold<5); b.innerHTML='⚔️ <b>近义成语混战</b><small>已解锁 '+BATTLES.filter(x=>nGold>=x.need).length+'/'+BATTLES.length+' 关 · 已通关 '+done+'/'+BATTLES.length+'</small>'; }
}
function buildGrid(){
  grid.innerHTML='';
  PAGES.forEach((pg,i)=>{
    const c=document.createElement('div');
    c.className='card unread';
    c.innerHTML='<img loading="lazy" src="'+pg.thumb+'" alt="'+pg.id+'"><div class="seal">✓</div><div class="nm disp">'+pg.id+'</div>';
    c.onclick=()=>openReader(i);
    grid.appendChild(c);
  });
  const b=document.createElement('div');
  b.className='battle'; b.id='battleCard';
  b.onclick=openBattleMenu;
  grid.appendChild(b);
  refreshGrid();
}

/* ---------- 阅读器：滑动 + 缩放 ---------- */
const reader=document.getElementById('reader'), stage=document.getElementById('stage');
let cur=0, pgEls={}, dragX=0, dragging=false, startX=0, startY=0, swipeLock=null;
let zoom={s:1,x:0,y:0}, pinch=null, lastTap=0;

function pageEl(i){
  if(pgEls[i]) return pgEls[i];
  const d=document.createElement('div'); d.className='pg';
  d.innerHTML='<img draggable="false" src="'+PAGES[i].image+'" alt="'+PAGES[i].id+'">';
  stage.appendChild(d); pgEls[i]=d; return d;
}
function layout(anim){
  for(const k in pgEls){
    const i=+k, el=pgEls[k];
    if(Math.abs(i-cur)>2){ el.remove(); delete pgEls[k]; continue; }
    el.style.transition = anim?'transform .22s ease-out':'none';
    const base=(i-cur)*stage.clientWidth + dragX;
    el.style.transform='translateX('+base+'px)';
    const img=el.querySelector('img');
    if(i===cur){ img.style.transform='translate('+zoom.x+'px,'+zoom.y+'px) scale('+zoom.s+')'; }
    else img.style.transform='';
  }
}
function goTo(i,anim){
  i=Math.max(0,Math.min(PAGES.length-1,i));
  if(i!==cur){ zoom={s:1,x:0,y:0}; }
  cur=i; dragX=0;
  pageEl(cur); if(cur>0)pageEl(cur-1); if(cur<PAGES.length-1)pageEl(cur+1);
  layout(anim);
  const pg=PAGES[cur];
  document.getElementById('rName').textContent=pg.id;
  document.getElementById('rPy').textContent=pg.pinyin;
  const qb=document.getElementById('rQuiz');
  if(isGold(pg)){ qb.disabled=false; qb.textContent='✦ 查看金卡'; qb.dataset.mode='view'; }
  else if(pg.questions.length){ qb.disabled=false; qb.textContent='答题赢金卡'; qb.dataset.mode='quiz'; }
  else { qb.disabled=true; qb.textContent='理解题即将上线'; qb.dataset.mode='quiz'; }
  document.getElementById('rPrev').disabled = cur===0;
  document.getElementById('rNext').disabled = cur===PAGES.length-1;
  renderInfo(pg);
  markRead(pg.id);
}
function openReader(i){ reader.classList.add('on'); document.body.style.overflow='hidden'; stage.querySelectorAll('.pg').forEach(e=>e.remove()); pgEls={}; goTo(i,false); }
function closeReader(){ reader.classList.remove('on'); document.body.style.overflow=''; infoEl.classList.remove('on'); }

document.getElementById('rBack').onclick=closeReader;
document.getElementById('rPrev').onclick=()=>goTo(cur-1,true);
document.getElementById('rNext').onclick=()=>goTo(cur+1,true);
document.addEventListener('keydown',e=>{
  if(!reader.classList.contains('on')||document.getElementById('quiz').classList.contains('on'))return;
  if(e.key==='ArrowLeft')goTo(cur-1,true);
  if(e.key==='ArrowRight')goTo(cur+1,true);
  if(e.key==='Escape')closeReader();
});

/* 触摸：单指滑动翻页 / 拖动已放大页；双指捏合缩放；双击缩放 */
const pts=new Map();
stage.addEventListener('pointerdown',e=>{
  stage.setPointerCapture(e.pointerId);
  pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pts.size===1){
    dragging=true; startX=e.clientX; startY=e.clientY; swipeLock=null;
    const now=Date.now();
    if(now-lastTap<300){ toggleZoom(e.clientX,e.clientY); dragging=false; }
    lastTap=now;
  }else if(pts.size===2){
    dragging=false;
    const a=[...pts.values()];
    pinch={d:Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y),s:zoom.s,cx:(a[0].x+a[1].x)/2,cy:(a[0].y+a[1].y)/2,zx:zoom.x,zy:zoom.y};
  }
});
stage.addEventListener('pointermove',e=>{
  if(!pts.has(e.pointerId))return;
  pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pts.size===2&&pinch){
    const a=[...pts.values()];
    const d=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);
    let s=Math.max(1,Math.min(4,pinch.s*d/pinch.d));
    const k=s/pinch.s;
    zoom={s:s, x:pinch.cx-(pinch.cx-pinch.zx)*k, y:pinch.cy-(pinch.cy-pinch.zy)*k};
    if(zoom.s===1){zoom.x=0;zoom.y=0;}
    layout(false); return;
  }
  if(!dragging)return;
  const dx=e.clientX-startX, dy=e.clientY-startY;
  if(zoom.s>1){ zoom.x+=e.clientX-startX; zoom.y+=e.clientY-startY; startX=e.clientX; startY=e.clientY; layout(false); return; }
  if(swipeLock===null && (Math.abs(dx)>8||Math.abs(dy)>8)) swipeLock=Math.abs(dx)>Math.abs(dy)?'x':'y';
  if(swipeLock==='x'){ dragX=dx; layout(false); }
});
function endPointer(e){
  pts.delete(e.pointerId);
  if(pts.size<2)pinch=null;
  if(pts.size===0&&dragging){
    dragging=false;
    if(zoom.s===1&&swipeLock==='x'){
      const th=stage.clientWidth*0.18;
      if(dragX<-th)goTo(cur+1,true);
      else if(dragX>th)goTo(cur-1,true);
      else{dragX=0;layout(true);}
    }
  }
}
stage.addEventListener('pointerup',endPointer);
stage.addEventListener('pointercancel',endPointer);
function toggleZoom(cx,cy){
  if(zoom.s>1){ zoom={s:1,x:0,y:0}; layout(false); return; }
  const el=pgEls[cur]; if(!el) return;
  const r=el.querySelector('img').getBoundingClientRect(); /* s=1 时即原始位置 */
  const s=2.4, qx=cx-r.left, qy=cy-r.top;
  zoom={s:s, x:qx*(1-s), y:qy*(1-s)};
  layout(false);
}

/* ---------- 释义抽屉 ---------- */
const infoEl=document.getElementById('info');
function renderInfo(pg){
  infoEl.innerHTML='<div class="cy disp">'+pg.id+'</div><div class="py">'+pg.pinyin+'</div>'
    +'<p><span class="lbl">解释</span>'+pg.explain+'</p>'
    +'<p><span class="lbl">例句</span>'+pg.example+'</p>';
}
document.getElementById('rInfo').onclick=()=>infoEl.classList.toggle('on');
stage.addEventListener('pointerdown',()=>infoEl.classList.remove('on'));

/* ---------- 答题 ---------- */
const quiz=document.getElementById('quiz'), qbox=document.getElementById('qbox');
let qIdx=0;
document.getElementById('rQuiz').onclick=function(){
  if(this.dataset.mode==='view'){ showGoldCard(PAGES[cur]); return; }
  qIdx=0; quiz.classList.add('on'); renderQ();
};
function renderQ(){
  const pg=PAGES[cur], q=pg.questions[qIdx];
  qbox.innerHTML='<div class="qtag">'+pg.id+' · 第 '+(qIdx+1)+'/'+pg.questions.length+' 题</div>'
    +'<div class="stem">'+q.stem+'</div>'
    +q.options.map((o,i)=>'<button class="opt" data-i="'+i+'">'+'ABC'[i]+'. '+o+'</button>').join('')
    +'<div class="qact"><button class="bghost" id="qClose">回去再读读</button></div>';
  qbox.querySelectorAll('.opt').forEach(b=>b.onclick=()=>answer(+b.dataset.i));
  document.getElementById('qClose').onclick=()=>quiz.classList.remove('on');
}
function answer(i){
  const pg=PAGES[cur], q=pg.questions[qIdx];
  const opts=qbox.querySelectorAll('.opt');
  opts.forEach(b=>b.disabled=true);
  const right = i===q.correct;
  opts[i].classList.add(right?'sel-right':'sel-wrong');
  if(!right) opts[q.correct].classList.add('sel-right');
  const why=document.createElement('div'); why.className='why';
  why.innerHTML=(right?'✅ 答对了！':'❌ 不对。')+'<br>'+q.why[i]+(right?'':'<br><b>正确是 '+'ABC'[q.correct]+'：</b>'+q.why[q.correct]);
  opts[opts.length-1].after(why);
  const act=qbox.querySelector('.qact'); act.innerHTML='';
  if(right){
    markQ(pg.id,q.id);
    if(qIdx<pg.questions.length-1){
      const n=document.createElement('button'); n.className='bmain'; n.textContent='下一题 ›';
      n.onclick=()=>{qIdx++;renderQ();}; act.appendChild(n);
    }else{
      const n=document.createElement('button'); n.className='bmain'; n.textContent='领取金卡 ✦';
      n.onclick=()=>{ quiz.classList.remove('on'); refreshGrid(); goTo(cur,false); showGoldCard(pg); };
      act.appendChild(n);
    }
  }else{
    const b=document.createElement('button'); b.className='bghost'; b.textContent='回漫画再读一遍';
    b.onclick=()=>quiz.classList.remove('on'); act.appendChild(b);
    const r=document.createElement('button'); r.className='bmain'; r.textContent='再试一次';
    r.onclick=renderQ; act.appendChild(r);
  }
}
/* ---------- 近义成语混战 ---------- */
const battleModal=document.getElementById('battleModal'), battleBody=document.getElementById('battleBody');
let battleIdx=0,battleQ=0,battleScore=0;
function goldCount(){return PAGES.filter(isGold).length;}
function openBattleMenu(){
  const n=goldCount();
  battleBody.innerHTML='<p>每获得5张金卡解锁一关。答对关内全部题目即可通关；答错可立即重试。</p><div class="battle-grid">'+BATTLES.map((b,i)=>'<button class="battle-level '+(prog._battle&&prog._battle[i]?'done':'')+'" data-i="'+i+'" '+(n<b.need?'disabled':'')+'><strong>'+(prog._battle&&prog._battle[i]?'✓ ':'')+b.title+'</strong>'+(n<b.need?'需要 '+b.need+' 张金卡':'已解锁 · '+b.qs.length+'题')+'</button>').join('')+'</div>';
  battleBody.querySelectorAll('.battle-level:not(:disabled)').forEach(x=>x.onclick=()=>startBattle(+x.dataset.i));
  battleModal.classList.add('on');
}
function startBattle(i){battleIdx=i;battleQ=0;battleScore=0;renderBattleQ();}
function renderBattleQ(){
 const b=BATTLES[battleIdx],q=b.qs[battleQ];
 battleBody.innerHTML='<div class="qtag">'+b.title+' · 第 '+(battleQ+1)+'/'+b.qs.length+' 题</div><div class="stem">'+q.s+'</div>'+q.o.map((o,i)=>'<button class="opt" data-i="'+i+'">'+'ABC'[i]+'. '+o+'</button>').join('');
 battleBody.querySelectorAll('.opt').forEach(x=>x.onclick=()=>answerBattle(+x.dataset.i));
}
function answerBattle(i){
 const b=BATTLES[battleIdx],q=b.qs[battleQ],opts=battleBody.querySelectorAll('.opt'),right=i===q.a;
 opts.forEach(x=>x.disabled=true);opts[i].classList.add(right?'sel-right':'sel-wrong');if(!right)opts[q.a].classList.add('sel-right');
 const d=document.createElement('div');d.className='why';d.innerHTML=(right?'✅ 答对了！':'❌ 再辨析一次。')+'<br>'+q.w;battleBody.appendChild(d);
 const n=document.createElement('button');n.className=right?'bmain opt':'bghost opt';n.textContent=right?(battleQ<b.qs.length-1?'下一题 ›':'完成关卡 ✦'):'重试本题';
 n.onclick=()=>{if(!right){renderBattleQ();return;}battleScore++;if(battleQ<b.qs.length-1){battleQ++;renderBattleQ();}else{prog._battle=prog._battle||{};prog._battle[battleIdx]=true;saveProg(prog);refreshGrid();battleBody.innerHTML='<div style="text-align:center;padding:24px 8px"><div style="font-size:52px">🏆</div><h2 class="disp">混战通关！</h2><p style="margin:10px 0 18px">你已分清这一组容易混淆的成语。</p><button class="bmain opt" onclick="openBattleMenu()">返回关卡</button></div>';}};battleBody.appendChild(n);
}
document.getElementById('battleClose').onclick=()=>battleModal.classList.remove('on');
battleModal.onclick=e=>{if(e.target===battleModal)battleModal.classList.remove('on');};
/* ---------- 金卡开卡仪式 ---------- */
const gt=document.getElementById('goldToast'), g3d=document.getElementById('g3d');
function showGoldCard(pg){
  const card=REWARD_CARDS[(pg.num-47)%REWARD_CARDS.length];
  document.getElementById('gtName').textContent='成语勇者金卡';
  document.getElementById('gPy').textContent=pg.id+' · '+pg.pinyin;
  document.getElementById('gDef').textContent='阅读故事并完成两道题目，正式收入图鉴。';
  document.getElementById('gNum').textContent='NHHS № '+pg.num;
  document.getElementById('gImg').src=card;
  gt.classList.remove('on'); void gt.offsetWidth; /* 重触发翻卡动画 */
  gt.classList.add('on');
}
document.getElementById('gClose').onclick=()=>gt.classList.remove('on');
gt.addEventListener('click',e=>{ if(e.target===gt) gt.classList.remove('on'); });
/* 幻彩倾斜：指针在卡上移动，3D 倾斜 + 金属光随角度流动 */
(function(){
  let raf=null;
  function tilt(e){
    const r=g3d.getBoundingClientRect();
    const px=(e.clientX-r.left)/r.width, py=(e.clientY-r.top)/r.height;
    if(raf) return;
    raf=requestAnimationFrame(()=>{
      raf=null;
      const rx=(py-.5)*-16, ry=(px-.5)*18;
      g3d.style.transition='transform .06s linear';
      g3d.style.transform='rotateX('+rx+'deg) rotateY('+ry+'deg)';
      document.getElementById('gHolo').style.setProperty('--hx',(130-px*170)+'%');
    });
  }
  function reset(){ g3d.style.transition='transform .5s ease'; g3d.style.transform='rotateX(0) rotateY(0)'; }
  g3d.addEventListener('pointermove',tilt);
  g3d.addEventListener('pointerleave',reset);
  g3d.addEventListener('pointerup',reset);
})();
quiz.addEventListener('click',e=>{ if(e.target===quiz) quiz.classList.remove('on'); });

/* ---------- 启动 ---------- */
function loadContent(){
  if(window.__CONTENT__) return Promise.resolve(window.__CONTENT__);
  if(location.protocol==='file:'){
    return new Promise(function(res,rej){
      var s=document.createElement('script');
      s.src=SRC.replace(/\.json$/,'.js');
      s.onload=function(){ window.__CONTENT__?res(window.__CONTENT__):rej(new Error('内容脚本无效')); };
      s.onerror=function(){ rej(new Error('找不到 '+s.src+'——请在解压出的完整文件夹里打开本文件，不要单独移动它')); };
      document.head.appendChild(s);
    });
  }
  return fetch(SRC).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); });
}
loadContent()
.then(d=>{
  DATA=d; PAGES=d.payload.pages; KEY='hwxb-'+d.content_id;
  prog=loadProg();
  document.getElementById('hsub').textContent=d.payload.subtitle||'';
  document.getElementById('stTotal').textContent=PAGES.length;
  document.getElementById('loadmsg').remove();
  buildGrid();
  window.addEventListener('resize',()=>{ if(reader.classList.contains('on')) layout(false); });
})
.catch(err=>{
  document.getElementById('loadmsg').textContent='内容加载失败（'+err.message+'）。请检查 content 文件路径后刷新。';
});
</script>
